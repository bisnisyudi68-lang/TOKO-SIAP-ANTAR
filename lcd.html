<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Produk LCD</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;padding-bottom:80px}
header{background:#15803d;color:white;padding:15px;text-align:center;font-weight:bold}
.card{
 background:white;
 margin:10px;
 padding:12px;
 border-radius:10px;
 box-shadow:0 2px 6px rgba(0,0,0,0.1)
}
.harga{color:#15803d;font-weight:bold}
button{
 background:#15803d;
 color:white;
 border:none;
 padding:6px 12px;
 border-radius:6px;
 margin-top:8px;
}
.cartBar{
 position:fixed;
 bottom:0;
 width:100%;
 background:#15803d;
 color:white;
 text-align:center;
 padding:15px;
 font-weight:bold;
}
</style>
</head>

<body>

<header>📱 Produk LCD</header>

<div id="listProduk"></div>

<div class="cartBar" onclick="window.location.href='cart.html'">
🛒 Lihat Keranjang
</div>

<script>

// ================= GOOGLE SHEET =================
const sheetId="1iPbtRGldW5yz6tuUZ5oHzMGsnNb4cHyCbAEMkq51qK4";
const sheetName="ZEVAN";

let semuaProduk=[];

function rupiah(a){
  return Math.round(a).toLocaleString("id-ID");
}

fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=${sheetName}`)
.then(res=>res.text())
.then(data=>{
  let json=JSON.parse(data.substring(47).slice(0,-2));
  
  semuaProduk=json.table.rows
  .filter(r=>r.c && r.c[0])
  .map(r=>({
    kode:r.c[0]?.v || "",
    nama:r.c[1]?.v || "",
    kategori:r.c[2]?.v || "",
    harga:Number(r.c[4]?.v || 0)
  }));

  renderProduk();
});

function renderProduk(){
  let list=document.getElementById("listProduk");
  list.innerHTML="";

  semuaProduk
  .filter(p=>p.kategori==="LCD")
  .forEach(p=>{

    list.innerHTML+=`
      <div class="card">
        <b>${p.nama}</b><br>
        <span class="harga">Rp ${rupiah(p.harga)}</span><br><br>
        <button onclick="tambahKeCart('${p.kode}','${p.nama}',${p.harga})">
        + Tambah
        </button>
      </div>
    `;
  });
}

// ================= CART =================
function tambahKeCart(kode,nama,harga){
  let cart=JSON.parse(localStorage.getItem("cart"))||[];

  let existing=cart.find(p=>p.kode===kode);

  if(existing){
    existing.qty++;
  }else{
    cart.push({kode,nama,harga,qty:1});
  }

  localStorage.setItem("cart",JSON.stringify(cart));

  alert("Produk masuk keranjang");
}

</script>
</body>
</html>
