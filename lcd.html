<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LCD - TOKO SIAP ANTAR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;padding-bottom:80px}
header{background:#15803d;color:white;padding:15px;text-align:center;font-size:20px}
.card{background:white;margin:10px;padding:12px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.harga{color:#15803d;font-weight:bold}
button{background:#15803d;color:white;border:none;padding:6px 12px;border-radius:6px}
.cartBtn{
 position:fixed;
 bottom:0;
 width:100%;
 background:#15803d;
 color:white;
 text-align:center;
 padding:15px;
 font-weight:bold;
}
</style>
</head>

<body>

<header>📱 Produk LCD</header>

<div id="listProduk"></div>

<div class="cartBtn" onclick="bukaKeranjang()">
🛒 Lihat Keranjang
</div>

<script>

const sheetId="1iPbtRGldW5yz6tuUZ5oHzMGsnNb4cHyCbAEMkq51qK4";
const sheetName="ZEVAN";

function rupiah(a){ return Math.round(a).toLocaleString("id-ID"); }

fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=${sheetName}`)
.then(res=>res.text())
.then(data=>{
 let json=JSON.parse(data.substring(47).slice(0,-2));
 let semua=json.table.rows
 .filter(r=>r.c && r.c[0])
 .map(r=>({
   kode:r.c[0]?.v||"",
   nama:r.c[1]?.v||"",
   harga:Number(r.c[4]?.v||0)
 }));

 // FILTER LCD SAJA (ubah sesuai kolom kategori nanti)
 let produkLCD = semua.filter(p=>p.nama.toLowerCase().includes("lcd"));

 render(produkLCD);
});

function render(data){
 let list=document.getElementById("listProduk");
 list.innerHTML="";

 data.forEach(p=>{
  list.innerHTML+=`
   <div class="card">
    <b>${p.nama}</b><br>
    ${p.kode}<br>
    <span class="harga">Rp ${rupiah(p.harga)}</span><br><br>
    <button onclick='tambahKeKeranjang(${JSON.stringify(p)})'>
    + Tambah
    </button>
   </div>
  `;
 });
}

function tambahKeKeranjang(produk){
 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 let existing=cart.find(x=>x.kode===produk.kode);

 if(existing){ existing.qty++; }
 else{ produk.qty=1; cart.push(produk); }

 localStorage.setItem("cart",JSON.stringify(cart));
 alert("Masuk keranjang");
}

function bukaKeranjang(){
 window.location.href="cart.html";
}

</script>
</body>
</html>
